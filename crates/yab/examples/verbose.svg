        @keyframes blink {
          0% { color: currentColor; background: transparent; }
          100% {
            color: color-mix(in hsl, currentColor 70%, transparent);
            background: rgb(from #1c1c1c r g b / 30%);
          }
        }
        .blink > span { animation: 2s steps(2, jump-none) 0s infinite blink; }
        .hard-br { margin-left: 8px; }
        .hard-br:before {
